<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Riya's Pink World 💖</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to right, #ffd6e0, #ffc0cb);
}

/* HEADER */
.header {
    height: 300px;
    background: url('https://images.unsplash.com/photo-1526040652367-ac003a0475fe') no-repeat center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 40px;
    font-weight: bold;
}

/* BOX SECTION */
.container {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 30px;
    padding: 50px;
}

/* CARD STYLE */
.card {
    height: 200px;
    border-radius: 20px;
    background: rgba(255,255,255,0.3);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    color: #ff1493;
    cursor: pointer;
    transition: 0.4s;
    position: relative;
    overflow: hidden;
}

/* HOVER EFFECT */
.card:hover {
    transform: scale(1.05);
    box-shadow: 0px 10px 30px rgba(255,105,180,0.6);
}

/* HIDDEN CONTENT */
.card .content {
    position: absolute;
    bottom: -100%;
    background: white;
    width: 100%;
    text-align: center;
    padding: 20px;
    transition: 0.4s;
}

.card:hover .content {
    bottom: 0;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 20px;
    color: white;
}

</style>
</head>

<body>

<div class="header">
    Riya’s Aesthetic World 🌸
</div>

<div class="container">

    <div class="card">
        About Me 💖
        <div class="content">I love DevOps & designing cute websites 😍</div>
    </div>

    <div class="card">
        My Work 🎀
        <div class="content">Jenkins + Docker + Kubernetes Projects 🚀</div>
    </div>

    <div class="card">
        Skills 🌷
        <div class="content">HTML, CSS, Docker, K8s 💻</div>
    </div>

    <div class="card">
        Contact 💌
        <div class="content">Email: riya@example.com</div>
    </div>

</div>

<div class="footer">
    Made with 💖 by Riya
</div>

</body>
</html>
