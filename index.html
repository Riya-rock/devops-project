<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riya's DevOps World 🌸</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ffdde1, #ee9ca7);
    overflow-x: hidden;
}

/* floating flowers */
.flower {
    position: absolute;
    top: -50px;
    font-size: 24px;
    animation: fall linear infinite;
}

@keyframes fall {
    to {
        transform: translateY(110vh);
    }
}

/* header */
header {
    text-align: center;
    padding: 30px;
    font-size: 28px;
    color: #fff;
    font-weight: bold;
}

/* cards */
.container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
    padding: 20px;
}

.card {
    background: rgba(255,255,255,0.3);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 25px;
    width: 220px;
    text-align: center;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.title {
    color: #ff4d88;
    font-weight: bold;
    margin-bottom: 10px;
}

.icon {
    font-size: 35px;
    margin-bottom: 10px;
}

/* cat */
.cat {
    position: fixed;
    bottom: 10px;
    right: 20px;
    font-size: 60px;
}

/* footer */
footer {
    text-align: center;
    padding: 15px;
    color: white;
}
</style>
</head>

<body>

<header>
🌸 Riya's DevOps Pipeline 💖
</header>

<div class="container">

    <div class="card">
        <div class="icon">🐙</div>
        <div class="title">GitHub</div>
        <p>Code stored safely 💻</p>
    </div>

    <div class="card">
        <div class="icon">⚙️</div>
        <div class="title">Jenkins</div>
        <p>CI/CD automation 🚀</p>
    </div>

    <div class="card">
        <div class="icon">🐳</div>
        <div class="title">Docker</div>
        <p>Container magic ✨</p>
    </div>

    <div class="card">
        <div class="icon">☸️</div>
        <div class="title">Kubernetes</div>
        <p>Single Node Cluster 💙</p>
    </div>

</div>

<!-- white cat -->
<div class="cat">🐱</div>

<footer>
🌸 Made with love by Riya 💖
</footer>

<script>
// generate falling flowers
for (let i = 0; i < 20; i++) {
    let flower = document.createElement("div");
    flower.className = "flower";
    flower.innerHTML = "🌸";
    flower.style.left = Math.random() * 100 + "vw";
    flower.style.animationDuration = (3 + Math.random() * 5) + "s";
    document.body.appendChild(flower);
}
</script>

</body>
</html>
