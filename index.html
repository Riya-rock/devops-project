<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DevOps Space</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #fff0f5, #ffd6e0);
    overflow-x: hidden;
}

/* header */
header {
    text-align: center;
    padding: 40px;
    font-size: 30px;
    font-weight: 600;
    color: #ff4d88;
}

/* container */
.container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 25px;
    padding: 30px;
}

/* cards */
.card {
    width: 240px;
    padding: 25px;
    border-radius: 20px;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 25px rgba(255,105,180,0.2);
    text-align: center;
    transition: all 0.3s ease;
}

.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 15px 35px rgba(255,105,180,0.4);
}

.icon {
    font-size: 35px;
    margin-bottom: 10px;
}

.title {
    font-size: 18px;
    font-weight: 600;
    color: #ff3385;
}

.desc {
    font-size: 14px;
    color: #555;
}

/* blossom petals */
.petal {
    position: fixed;
    top: -10px;
    font-size: 18px;
    animation: fall linear infinite;
}

@keyframes fall {
    to {
        transform: translateY(110vh);
    }
}

/* footer */
footer {
    text-align: center;
    padding: 20px;
    color: #ff4d88;
}
</style>
</head>

<body>

<header>
Riya's DevOps Pipeline
</header>

<div class="container">

    <div class="card">
        <div class="icon">Git</div>
        <div class="title">GitHub</div>
        <div class="desc">Code version control</div>
    </div>

    <div class="card">
        <div class="icon">CI</div>
        <div class="title">Jenkins</div>
        <div class="desc">Automation pipeline</div>
    </div>

    <div class="card">
        <div class="icon">Docker</div>
        <div class="title">Docker</div>
        <div class="desc">Containerized apps</div>
    </div>

    <div class="card">
        <div class="icon">K8s</div>
        <div class="title">Kubernetes</div>
        <div class="desc">Cluster deployment</div>
    </div>

</div>

<footer>
Built by Riya
</footer>

<script>
for (let i = 0; i < 25; i++) {
    let petal = document.createElement("div");
    petal.className = "petal";
    petal.innerHTML = "🌸";
    petal.style.left = Math.random() * 100 + "vw";
    petal.style.animationDuration = (4 + Math.random() * 5) + "s";
    document.body.appendChild(petal);
}
</script>

</body>
</html>
